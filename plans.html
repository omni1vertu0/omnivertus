<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Vertus | Catalogue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #022c22; 
            background-image: radial-gradient(circle at 0% 0%, #064e3b 0%, transparent 50%), radial-gradient(circle at 100% 100%, #065f46 0%, transparent 50%);
            background-attachment: fixed;
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #f1d37a 100%); }
        .card-plan { transition: all 0.3s ease; border: 1px solid rgba(212, 175, 55, 0.1); }
        .card-plan:hover { transform: translateY(-5px); border-color: #d4af37; }
    </style>
</head>
<body class="p-4 pb-28">

    <div class="max-w-md mx-auto">
        <div class="flex items-center justify-between mb-8 pt-4">
            <button onclick="window.history.back()" class="w-10 h-10 glass rounded-full flex items-center justify-center text-[#d4af37]">←</button>
            <div class="text-right">
                <p class="text-[9px] text-gold uppercase font-black tracking-widest" style="color: #d4af37;">Votre Solde</p>
                <p class="text-lg font-black"><span id="user-balance">...</span> <span class="text-[10px]">CDF</span></p>
            </div>
        </div>

        <h1 class="text-xl font-black uppercase tracking-tighter mb-6 italic text-center">Catalogue d'Investissement</h1>

        <div class="grid grid-cols-1 gap-6" id="plans-container"></div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass border border-white/10 p-4 flex justify-around items-center rounded-[2.5rem] shadow-2xl z-50">
        <button onclick="location.href='dashboard.html'" class="text-gray-500 text-xl opacity-50">🏠</button>
        <button class="text-[#d4af37] text-xl">📈</button>
        <button onclick="location.href='team.html'" class="text-gray-500 text-xl opacity-50">👥</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://omni-f2a9c-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const userPhone = localStorage.getItem('userPhone');
        let currentBalance = 0;
        let userData = null;

        const plans = [
            { id: 1, img: "🛰️", name: "VIP1 Instrument Alpha", prix: 15000, jour: 3000, total: 270000 },
            { id: 2, img: "🔋", name: "VIP2 Instrument Beta", prix: 30000, jour: 6300, total: 567000 },
            { id: 3, img: "🛡️", name: "VIP3 Instrument Gamma", prix: 65000, jour: 14300, total: 1287000 },
            { id: 4, img: "💻", name: "VIP4 Instrument Delta", prix: 100000, jour: 23000, total: 2070000 },
            { id: 5, img: "📡", name: "VIP5 Instrument Epsilon", prix: 200000, jour: 48000, total: 4320000 },
            { id: 6, img: "💎", name: "VIP6 Instrument Zeta", prix: 350000, jour: 87500, total: 7875000 },
            { id: 7, img: "🚀", name: "VIP7 Instrument Omega", prix: 500000, jour: 130000, total: 11700000 },
            { id: 8, img: "🏛️", name: "VIP8 Instrument Royal", prix: 1000000, jour: 300000, total: 27000000 }
        ];

        async function loadUserData() {
            if(!userPhone) return window.location.href="index.html";
            const snap = await get(ref(db, 'users/' + userPhone));
            if(snap.exists()) {
                userData = snap.val();
                currentBalance = userData.solde || 0;
                document.getElementById('user-balance').innerText = currentBalance.toLocaleString();
            }
        }

        const container = document.getElementById('plans-container');
        plans.forEach(plan => {
            container.innerHTML += `
                <div class="card-plan glass rounded-[2rem] p-5 relative overflow-hidden">
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 rounded-2xl bg-white/5 flex items-center justify-center text-3xl border border-white/10">${plan.img}</div>
                        <div class="flex-1">
                            <h3 class="text-white font-black text-sm uppercase leading-tight">${plan.name}</h3>
                            <p class="text-[#d4af37] font-bold text-xs mt-1">${plan.prix.toLocaleString()} CDF</p>
                        </div>
                        <button onclick="buyPlan(${plan.prix}, '${plan.name}')" class="gold-gradient px-4 py-2 rounded-xl text-[10px] text-emerald-950 font-black uppercase shadow-lg">Activer</button>
                    </div>
                    <div class="grid grid-cols-3 gap-2 mt-5 pt-4 border-t border-white/5 text-center">
                        <div><p class="text-[8px] text-gray-500 uppercase font-bold italic">Quotidien</p><p class="text-[11px] font-black">+${plan.jour.toLocaleString()}</p></div>
                        <div><p class="text-[8px] text-gray-500 uppercase font-bold italic">Total</p><p class="text-[11px] font-black">${plan.total.toLocaleString()}</p></div>
                        <div><p class="text-[8px] text-gray-500 uppercase font-bold italic">Cycle</p><p class="text-[11px] font-black">90 Jours</p></div>
                    </div>
                </div>
            `;
        });

        window.buyPlan = async (prix, nom) => {
            if (currentBalance < prix) return alert("❌ Solde insuffisant !");
            if (!confirm("Confirmer l'activation de " + nom + " ?")) return;

            try {
                // 1. Déduire du solde de l'acheteur
                await update(ref(db, 'users/' + userPhone), { solde: currentBalance - prix });

                // 2. Logique Commissions sur 3 Niveaux
                const usersSnap = await get(ref(db, 'users'));
                const allUsers = usersSnap.val();

                let currentParrainCode = userData.parraine_par;
                const taux = [0.25, 0.03, 0.01]; // 25%, 3%, 1%

                for (let i = 0; i < 3; i++) {
                    if (!currentParrainCode) break;

                    const parrainPhone = Object.keys(allUsers).find(key => allUsers[key].mon_code === currentParrainCode);
                    
                    if (parrainPhone) {
                        const commission = prix * taux[i];
                        await update(ref(db, 'users/' + parrainPhone), {
                            solde: increment(commission),
                            total_commissions: increment(commission)
                        });
                        // On passe au parrain du dessus pour le niveau suivant
                        currentParrainCode = allUsers[parrainPhone].parraine_par;
                    } else {
                        break;
                    }
                }

                alert("✅ Activation réussie !");
                location.reload();
            } catch (e) {
                alert("Erreur système.");
            }
        };

        loadUserData();
    </script>
</body>
</html>

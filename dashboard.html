<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Vertus | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #022c22; background-image: radial-gradient(circle at 0% 0%, #064e3b 0%, transparent 50%), radial-gradient(circle at 100% 100%, #065f46 0%, transparent 50%); background-attachment: fixed; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #f1d37a 100%); }
    </style>
</head>
<body class="p-4 pb-24">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-8 pt-4">
            <div><p class="text-[10px] text-[#d4af37] uppercase font-bold">Espace Partenaire</p><h1 class="text-xl font-black italic">OMNI VERTUS</h1></div>
            <div class="w-10 h-10 rounded-full border-2 border-[#d4af37] flex items-center justify-center bg-white/10"><span class="text-[#d4af37] font-bold text-xs">OV</span></div>
        </div>

        <div class="gold-gradient p-8 rounded-[2.5rem] text-emerald-950 shadow-2xl shadow-gold/30 mb-8 relative overflow-hidden">
            <p class="text-[10px] uppercase font-black opacity-70 mb-1">Solde Disponible</p>
            <div class="flex items-baseline gap-2">
                <span class="text-4xl font-black" id="balance-display">...</span>
                <span class="text-sm font-bold">CDF</span>
            </div>
            <div class="mt-8 flex gap-3">
                <button onclick="window.location.href='deposit.html'" class="bg-emerald-950 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg">Dépôt</button>
                <button onclick="window.location.href='withdraw.html'" class="bg-white/40 text-emerald-950 px-6 py-3 rounded-2xl text-[10px] font-black uppercase border border-white/20">Retrait</button>
            </div>
        </div>

        <div class="grid grid-cols-4 gap-4 mb-10 text-center">
            <div onclick="window.location.href='plans.html'" class="cursor-pointer group"><div class="w-full aspect-square glass rounded-[1.5rem] flex items-center justify-center text-2xl mb-2 border-b-2 border-gold/20">📊</div><span class="text-[8px] font-bold uppercase text-gray-400">Plans</span></div>
            <div onclick="window.location.href='team.html'" class="cursor-pointer group"><div class="w-full aspect-square glass rounded-[1.5rem] flex items-center justify-center text-2xl mb-2">👥</div><span class="text-[8px] font-bold uppercase text-gray-400">Équipe</span></div>
            <div onclick="window.location.href='bonus.html'" class="cursor-pointer group"><div class="w-full aspect-square glass rounded-[1.5rem] flex items-center justify-center text-2xl mb-2">💰</div><span class="text-[8px] font-bold uppercase text-gray-400">Bonus</span></div>
            <div onclick="window.location.href='support.html'" class="cursor-pointer group"><div class="w-full aspect-square glass rounded-[1.5rem] flex items-center justify-center text-2xl mb-2">💬</div><span class="text-[8px] font-bold uppercase text-gray-400">Aide</span></div>
        </div>

        <div class="text-center py-10 glass rounded-[2rem] border-dashed border-2 border-white/10">
            <p class="text-gray-500 text-[10px] italic uppercase font-bold">Prêt pour votre premier contrat ?</p>
        </div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass border border-white/10 p-4 flex justify-around items-center rounded-[2.5rem] z-50">
        <button class="text-[#d4af37] text-xl">🏠</button>
        <button onclick="window.location.href='plans.html'" class="text-gray-500 text-xl opacity-50">📈</button>
        <button onclick="window.location.href='team.html'" class="text-gray-500 text-xl opacity-50">👥</button>
        <button onclick="window.location.href='profile.html'" class="text-gray-500 text-xl opacity-50">👤</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://omni-f2a9c-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const userPhone = localStorage.getItem('userPhone');

        if (!userPhone) {
            window.location.href = "index.html";
        } else {
            onValue(ref(db, 'users/' + userPhone), (snapshot) => {
                if (snapshot.exists()) {
                    document.getElementById('balance-display').innerText = (snapshot.val().solde || 0).toLocaleString();
                }
            });
        }
    </script>
</body>
</html>

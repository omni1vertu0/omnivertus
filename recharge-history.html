<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Vertus | Mes Recharges</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #022c22; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .status-pending { color: #fbbf24; }
        .status-success { color: #10b981; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto pt-4">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="window.history.back()" class="w-10 h-10 glass rounded-full flex items-center justify-center text-gold">←</button>
            <h1 class="text-lg font-black uppercase tracking-widest">Mes Recharges</h1>
        </div>

        <div id="recharge-list" class="space-y-4">
            <p class="text-center opacity-30 text-xs mt-10">Chargement...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://omni-vertus-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const myPhone = localStorage.getItem('userPhone');

        const listDiv = document.getElementById('recharge-list');

        onValue(ref(db, 'admin_requests/recharges'), (snapshot) => {
            listDiv.innerHTML = "";
            let found = false;

            snapshot.forEach((child) => {
                const data = child.val();
                if(data.user === myPhone) {
                    found = true;
                    const statusClass = data.status === "EN ATTENTE" ? "status-pending" : "status-success";
                    listDiv.innerHTML += `
                        <div class="glass p-5 rounded-3xl border border-white/5">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-sm font-black text-white">${parseInt(data.montant).toLocaleString()} FC</p>
                                    <p class="text-[8px] text-gray-500 uppercase mt-1">ID: ${data.transactionID || 'N/A'}</p>
                                </div>
                                <span class="text-[9px] font-black uppercase ${statusClass}">${data.status}</span>
                            </div>
                            <p class="text-[8px] opacity-40 mt-3 font-bold">${data.date}</p>
                        </div>
                    `;
                }
            });

            if(!found) listDiv.innerHTML = '<p class="text-center opacity-30 text-xs mt-10">Aucune recharge trouvée.</p>';
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Vertus | Profil Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #022c22; 
            background-image: radial-gradient(circle at 0% 0%, #064e3b 0%, transparent 50%), radial-gradient(circle at 100% 100%, #10b981 0%, transparent 50%);
            background-attachment: fixed;
            color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .profile-avatar { width: 90px; height: 90px; border: 3px solid #d4af37; padding: 3px; position: relative; }
        .profile-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .gold-glow { box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .btn-active:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body class="p-4 pb-28">

    <div class="max-w-md mx-auto">
        <div class="flex items-center justify-between mb-8 pt-4">
            <h1 class="text-lg font-black uppercase tracking-[0.3em] text-white">Mon Compte</h1>
            <button onclick="logout()" class="text-[10px] font-black uppercase text-red-400 border border-red-400/30 px-4 py-2 rounded-full active:bg-red-500/10 transition-all">Quitter</button>
        </div>

        <div class="glass p-8 rounded-[2.5rem] border border-white/10 text-center mb-8 relative overflow-hidden shadow-2xl">
            <div class="relative z-10">
                <div class="profile-avatar rounded-full mx-auto mb-4 bg-emerald-950 gold-glow">
                    <img id="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=User" alt="Avatar">
                </div>
                <h2 id="display-phone" class="text-xl font-black tracking-widest text-white mb-2 italic">Chargement...</h2>
                <div class="inline-flex items-center gap-2 px-5 py-1.5 rounded-full bg-gold/10 border border-gold/30">
                    <span class="w-2 h-2 rounded-full bg-gold animate-pulse"></span>
                    <span id="display-vip" class="text-[10px] font-black text-gold uppercase tracking-tighter italic">Membre VIP 0</span>
                </div>
            </div>
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-emerald-500/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-gold/5 rounded-full blur-3xl"></div>
        </div>

        <div class="space-y-4">
            
            <button onclick="location.href='withdraw-history.html'" class="btn-active w-full glass p-5 rounded-[2rem] flex items-center justify-between border border-white/5 shadow-lg">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-xl">📜</div>
                    <div class="text-left">
                        <p class="text-[11px] font-black uppercase tracking-widest text-white">Historique des retraits</p>
                        <p class="text-[9px] text-gray-500 uppercase font-bold tracking-tight">Suivre vos paiements</p>
                    </div>
                </div>
                <span class="text-gold opacity-50 font-bold">→</span>
            </button>

            <button onclick="location.href='recharge-history.html'" class="btn-active w-full glass p-5 rounded-[2rem] flex items-center justify-between border border-white/5 shadow-lg">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-xl">💳</div>
                    <div class="text-left">
                        <p class="text-[11px] font-black uppercase tracking-widest text-white">Mes recharges</p>
                        <p class="text-[9px] text-gray-500 uppercase font-bold tracking-tight">Vérifier vos dépôts</p>
                    </div>
                </div>
                <span class="text-gold opacity-50 font-bold">→</span>
            </button>

            <button onclick="window.location.href='https://t.me/client_ser'" class="btn-active w-full glass p-5 rounded-[2rem] flex items-center justify-between border border-emerald-500/30 shadow-lg bg-emerald-500/5">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-emerald-500/20 flex items-center justify-center text-xl animate-bounce">🎧</div>
                    <div class="text-left">
                        <p class="text-[11px] font-black uppercase tracking-widest text-white">Service Client</p>
                        <p class="text-[9px] text-emerald-400 uppercase font-bold tracking-tight">Ouvrir Telegram Officiel</p>
                    </div>
                </div>
                <span class="text-emerald-400 font-bold">LANCER</span>
            </button>

            <button class="w-full glass p-5 rounded-[2rem] flex items-center justify-between border border-white/5 opacity-50 cursor-not-allowed">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-xl">🛡️</div>
                    <div class="text-left">
                        <p class="text-[11px] font-black uppercase tracking-widest text-white">Confidentialité</p>
                        <p class="text-[9px] text-gray-500 uppercase font-bold tracking-tight">Gestion des données</p>
                    </div>
                </div>
                <span class="text-gold opacity-50 font-bold">→</span>
            </button>
        </div>

        <p class="text-center text-[9px] text-gray-600 mt-12 uppercase font-black tracking-[0.3em] opacity-50">Omni Vertus Cloud System • 2026</p>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass rounded-[2.5rem] p-4 flex justify-around items-center border border-white/10 shadow-2xl z-50">
        <button onclick="location.href='dashboard.html'" class="text-xl opacity-40 hover:opacity-100 transition">🏠</button>
        <button onclick="location.href='plans.html'" class="text-xl opacity-40 hover:opacity-100 transition">📈</button>
        <button onclick="location.href='team.html'" class="text-xl opacity-40 hover:opacity-100 transition">👥</button>
        <button class="text-2xl text-gold drop-shadow-[0_0_8px_rgba(212,175,55,0.5)]">👤</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://omni-vertus-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const myPhone = localStorage.getItem('userPhone') || "Invite";
        
        document.getElementById('display-phone').innerText = myPhone;
        document.getElementById('user-avatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${myPhone}`;

        const userRef = ref(db, 'users/' + myPhone);
        onValue(userRef, (snapshot) => {
            if(snapshot.exists()) {
                const user = snapshot.val();
                document.getElementById('display-vip').innerText = "Membre " + (user.vip || "VIP 0");
            }
        });

        window.logout = () => {
            if(confirm("Confirmer la déconnexion ?")) {
                localStorage.clear();
                window.location.href = "index.html";
            }
        };
    </script>
</body>
</html>

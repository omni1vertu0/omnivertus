<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Vertus | Mon Équipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #022c22; 
            background-image: radial-gradient(circle at 0% 0%, #064e3b 0%, transparent 50%), radial-gradient(circle at 100% 100%, #10b981 0%, transparent 50%);
            background-attachment: fixed;
            color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #f1d37a 100%); }
        .tab-btn { border-bottom: 2px solid transparent; transition: 0.3s; opacity: 0.5; }
        .tab-btn.active { border-bottom: 2px solid #d4af37; opacity: 1; color: #d4af37; }
    </style>
</head>
<body class="p-4 pb-28">

    <div class="max-w-md mx-auto">
        <div class="flex items-center gap-4 mb-6 pt-4">
            <button onclick="window.location.href='dashboard.html'" class="w-10 h-10 glass rounded-full flex items-center justify-center text-[#d4af37]">←</button>
            <h1 class="text-lg font-black uppercase tracking-widest text-white">Réseau</h1>
        </div>

        <div class="glass p-6 rounded-[2.5rem] border border-gold/20 mb-6 shadow-2xl">
            <div class="text-center mb-4">
                <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest">Ma Commission Totale</p>
                <p class="text-3xl font-black text-white" id="total-comm">0 <span class="text-xs text-gold">CDF</span></p>
            </div>
            
            <div class="flex gap-2 bg-black/30 p-2 rounded-2xl border border-white/5">
                <input type="text" id="refLink" readonly class="bg-transparent flex-1 text-[10px] px-2 outline-none text-gray-400">
                <button onclick="copyRef()" class="gold-gradient px-4 py-2 rounded-xl text-emerald-950 font-black text-[10px] uppercase">Copier</button>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-6">
            <div class="glass p-3 rounded-2xl text-center">
                <p class="text-gold font-black text-sm">25%</p>
                <p class="text-[8px] uppercase text-gray-400">Niv. 1</p>
            </div>
            <div class="glass p-3 rounded-2xl text-center">
                <p class="text-gold font-black text-sm">3%</p>
                <p class="text-[8px] uppercase text-gray-400">Niv. 2</p>
            </div>
            <div class="glass p-3 rounded-2xl text-center">
                <p class="text-gold font-black text-sm">1%</p>
                <p class="text-[8px] uppercase text-gray-400">Niv. 3</p>
            </div>
        </div>

        <div class="glass rounded-[2.5rem] overflow-hidden border border-white/5">
            <div class="flex bg-white/5">
                <button onclick="switchTab(1)" id="tab1" class="tab-btn active flex-1 py-4 text-[10px] font-black uppercase">Niveau 1</button>
                <button onclick="switchTab(2)" id="tab2" class="tab-btn flex-1 py-4 text-[10px] font-black uppercase">Niveau 2</button>
                <button onclick="switchTab(3)" id="tab3" class="tab-btn flex-1 py-4 text-[10px] font-black uppercase">Niveau 3</button>
            </div>
            
            <div id="member-list" class="p-4 space-y-3 min-h-[300px]">
                </div>
        </div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass border border-white/10 p-4 flex justify-around items-center rounded-[2.5rem] shadow-2xl z-50">
        <button onclick="window.location.href='dashboard.html'" class="text-gray-500 text-xl opacity-50">🏠</button>
        <button onclick="window.location.href='plans.html'" class="text-gray-500 text-xl opacity-50">📈</button>
        <button class="text-gold text-xl">👥</button>
        <button onclick="window.location.href='profile.html'" class="text-gray-500 text-xl opacity-50">👤</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://omni-f2a9c-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const myPhone = localStorage.getItem('userPhone');
        let myInviteCode = "";

        // 1. Récupérer mes infos (mon code et mes commissions)
        if (myPhone) {
            onValue(ref(db, 'users/' + myPhone), (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    myInviteCode = data.mon_code;
                    document.getElementById('total-comm').innerText = (data.total_commissions || 0).toLocaleString() + " CDF";
                    document.getElementById('refLink').value = window.location.origin + "/register.html?ref=" + myInviteCode;
                    loadLevel(1); // Charger le niveau 1 dès qu'on a le code
                }
            });
        }

        window.copyRef = () => {
            const link = document.getElementById('refLink');
            link.select();
            navigator.clipboard.writeText(link.value);
            alert("Lien de parrainage copié !");
        };

        window.switchTab = (lvl) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab' + lvl).classList.add('active');
            loadLevel(lvl);
        };

        async function loadLevel(level) {
            const listDiv = document.getElementById('member-list');
            listDiv.innerHTML = '<p class="text-center text-xs mt-10 opacity-50 italic">Chargement...</p>';

            const snapshot = await get(ref(db, 'users'));
            if (!snapshot.exists()) return;

            const allUsers = snapshot.val();
            listDiv.innerHTML = "";
            let foundCount = 0;

            // Logique de filtrage par niveau
            Object.keys(allUsers).forEach(phone => {
                const user = allUsers[phone];
                let isMatch = false;

                if (level === 1 && user.parraine_par === myInviteCode) {
                    isMatch = true;
                } 
                // Pour Niv 2 et 3, on remonte la chaîne
                else if (level === 2) {
                    const parrainNiv1 = Object.values(allUsers).find(u => u.mon_code === user.parraine_par);
                    if (parrainNiv1 && parrainNiv1.parraine_par === myInviteCode) isMatch = true;
                }
                else if (level === 3) {
                    const parrainNiv1 = Object.values(allUsers).find(u => u.mon_code === user.parraine_par);
                    if (parrainNiv1) {
                        const parrainNiv2 = Object.values(allUsers).find(u => u.mon_code === parrainNiv1.parraine_par);
                        if (parrainNiv2 && parrainNiv2.parraine_par === myInviteCode) isMatch = true;
                    }
                }

                if (isMatch) {
                    foundCount++;
                    listDiv.innerHTML += `
                        <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                            <div>
                                <p class="text-xs font-black">${phone.substring(0, 6)}****</p>
                                <p class="text-[8px] text-gray-500 uppercase">Membre Actif</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-emerald-400 font-bold uppercase">Niveau ${level}</p>
                            </div>
                        </div>
                    `;
                }
            });

            if (foundCount === 0) {
                listDiv.innerHTML = `<div class="text-center mt-20 opacity-20"><p class="text-4xl mb-2">👥</p><p class="text-[10px] uppercase font-bold tracking-widest">Aucun membre Niv. ${level}</p></div>`;
            }
        }
    </script>
</body>
</html>
